name: ocula_app
description: "Multi-agent on-device AI app with vision, reasoning, and voice."
publish_to: 'none'
version: 1.0.3+12

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # AI Core - Local fork with iOS @_silgen_name fix (String → UnsafePointer<CChar>)
  flutter_llama:
    path: plugins/flutter_llama

  # Assistant Features
  speech_to_text: ^7.0.0         # STT — voice input
  flutter_tts: ^4.2.0            # TTS — voice output

  # Document & Communication
  pdf: ^3.11.0                   # Generate PDF reports
  share_plus: ^10.0.0            # Send to Email/WhatsApp/Slack
  path_provider: ^2.1.2          # Manage model storage on device
  url_launcher: ^6.2.5           # Open links in Settings/About

  # Media
  camera: ^0.11.0                # Vision input from device camera

  # Database — On-device persistence (system SQLite, zero binary bloat)
  sqflite: ^2.4.1
  path: ^1.9.0
  uuid: ^4.0.0

  # Local data access
  flutter_contacts: ^1.1.9       # Read contacts
  image_picker: ^1.1.2           # Pick photos from gallery
  photo_manager: ^3.6.0          # Access photo library for indexing
  device_calendar: ^4.3.2        # Read calendar events
  file_picker: ^10.3.10          # User file uploads for summarize/enhance
  permission_handler: ^11.3.0    # Request permissions at first launch
  receive_sharing_intent: ^1.8.1  # Receive shared content from other apps
  enough_mail: any               # IMAP email access (local)
  lottie: ^3.3.2
  shared_preferences: ^2.5.4
  device_info_plus: ^11.0.0      # RAM detection for model routing
  syncfusion_flutter_pdf: any    # PDF text extraction for RAG indexing
  archive: any                   # OOXML unzip for docx/pptx/xlsx extraction
  xml: any                       # OOXML XML parsing

  # Notifications & Background
  flutter_local_notifications: ^18.0.1  # Local notification delivery
  workmanager: ^0.9.0+3                 # Background task scheduling
  timezone: ^0.9.4                      # Timezone-aware notification scheduling
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_native_splash:
  color: "#0a0a0a"
  image: assets/images/splash_static_core.png
  android_12:
    image: assets/images/splash_static_core.png
    color: "#0a0a0a"

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
