# Moondream2 Vision Fine-tuning Config
# For improving image detection + document understanding (Plus tier)

model:
  name: "vikhyatk/moondream2"
  revision: "2025-01-09"
  local_path: "../models/base/moondream2"
  type: "vlm"
  params: "1.8B"

training:
  method: "qlora"          # QLoRA required — 1.8B too large for full fine-tune
  epochs: 1
  batch_size: 4            # CUDA 16GB: 4, MPS: 2, MLX: 1
  gradient_accumulation: 4 # Effective batch = 16
  learning_rate: 1.0e-4    # Conservative for 1.8B model
  lr_scheduler: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_seq_length: 2048
  max_samples: 30000       # Cap per training run
  max_steps: 5000          # Hard cap on training steps (loss converges early)
  fp16: false
  bf16: true

lora:
  rank: 16                 # r=16 for 1.8B (lighter than SmolVLM2)
  alpha: 32                # alpha = 2×rank
  dropout: 0.05
  target_modules:          # Moondream2 Phi-1.5 backbone layers
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "dense"
    - "fc1"
    - "fc2"

data:
  train: "../data/vision_moondream/moondream2_vision_train.jsonl"
  val: "../data/vision_moondream/moondream2_vision_val.jsonl"
  image_dir: "../data/vision_moondream/images"

  datasets:
    image:
      - vqav2               # Visual QA (~8K)
      - textcaps             # OCR-aware captioning (~8K)
      - coco                 # Standard captions (~8K)
      - gqa                  # Compositional reasoning (~8K)
    document:
      - docvqa               # Document QA (~8K)

mlx:
  batch_size: 1
  lora_layers: 12
  # Estimated training time on M1 Pro (16GB):
  #   ~30K examples × 2 epochs → ~8–10 hours
  # Estimated training time on M2 Ultra (192GB):
  #   ~30K examples × 2 epochs → ~2–3 hours

quantization:
  methods:
    - "Q4_K_M"             # Primary — good balance for 1.8B
    - "Q8_0"               # Higher quality, ~2× size
  output_dir: "../models/gguf"
  output_name: "moondream2-finetuned"
