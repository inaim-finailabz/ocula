# MiniLM-L6-v2 Embedding Fine-tuning Config
# 22M params — full fine-tune, tiny VRAM footprint

model:
  name: "sentence-transformers/all-MiniLM-L6-v2"
  local_path: "../models/base/minilm-l6-v2"
  type: "embedding"
  params: "22M"
  embedding_dim: 384

training:
  method: "full"           # 22M is tiny — always full fine-tune
  epochs: 5
  batch_size: 128          # CUDA: 128, MLX: 64
  learning_rate: 2.0e-5
  lr_scheduler: "warmup_linear"
  warmup_steps: 500
  weight_decay: 0.01

  # Sentence-transformers specific
  loss: "MultipleNegativesRankingLoss"  # Best for retrieval
  evaluator: "InformationRetrievalEvaluator"

data:
  train: "../data/processed/retrieval_*_train.jsonl"
  val: "../data/processed/retrieval_*_val.jsonl"
  max_samples: 500000      # Embeddings benefit from more data

quantization:
  methods:
    - "Q8_0"               # Embeddings need higher precision
  output_dir: "../models/gguf"
  output_name: "all-MiniLM-L6-v2-finetuned"
