# Ocula Lite: Qwen2.5-1.5B Text Fine-tuning Config

model:
  name: "Qwen/Qwen2.5-1.5B-Instruct"
  short_name: "ocula-lite-qwen25-1_5b"
  local_path: "../models/base/qwen2.5-1.5b-instruct"
  type: "llm"
  params: "1.5B"

training:
  method: "qlora"
  epochs: 3
  batch_size: 2
  gradient_accumulation: 16
  learning_rate: 5.0e-5
  lr_scheduler: "cosine"
  warmup_ratio: 0.1
  weight_decay: 0.01
  max_seq_length: 4096
  fp16: true
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_quant_type: "nf4"

lora:
  rank: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

data:
  train: "../data/processed/chat_*_train.jsonl"
  val: "../data/processed/chat_*_val.jsonl"
  max_samples: 120000

quantization:
  methods:
    - "Q4_K_M"
    - "Q3_K_M"
  output_dir: "../models/gguf"
  output_name: "Ocula-Lite-Qwen2.5-1.5B"

mlx:
  batch_size: 1
  lora_layers: 8
