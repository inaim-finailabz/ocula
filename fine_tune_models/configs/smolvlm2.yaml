# SmolVLM2-500M Fine-tuning Config
# Small enough for full fine-tune OR LoRA on RTX 4070 (16GB)

model:
  name: "HuggingFaceTB/SmolVLM2-500M-Video-Instruct"
  local_path: "../models/base/smolvlm2-500m"
  type: "vlm"
  params: "500M"

training:
  method: "lora"           # "full" or "lora" — 500M is small enough for full
  epochs: 3
  batch_size: 8            # CUDA: 8, MLX: 4
  gradient_accumulation: 4
  learning_rate: 2.0e-4    # Higher LR for small model
  lr_scheduler: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_seq_length: 2048
  fp16: true               # Use bf16 on Ampere+

lora:
  rank: 32                 # Higher rank for small model (more capacity)
  alpha: 64
  dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

data:
  train: "../data/processed/chat_*_train.jsonl"
  val: "../data/processed/chat_*_val.jsonl"
  max_samples: 50000       # Cap for quick iterations

quantization:
  methods:
    - "Q8_0"               # 500M model is small, Q8 keeps quality
  output_dir: "../models/gguf"
  output_name: "SmolVLM2-500M-Video-Instruct-finetuned"

mlx:
  batch_size: 4
  lora_layers: 16          # MLX lora_layers param
