# SmolVLM2-500M Vision Fine-tuning Config
# For improving image detection + document understanding

model:
  name: "HuggingFaceTB/SmolVLM2-500M-Video-Instruct"
  local_path: "../models/base/smolvlm2-500m"   # Downloaded HF model (optional)
  type: "vlm"
  params: "500M"

training:
  method: "lora"           # "lora" recommended — fast, memory-efficient
  epochs: 1
  batch_size: 4            # CUDA: 4–8, MPS: 2, MLX: 4
  gradient_accumulation: 4 # Effective batch = batch_size × grad_accum
  learning_rate: 2.0e-4    # Higher LR ok for small model with LoRA
  lr_scheduler: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_seq_length: 2048
  max_samples: 50000       # Cap per training run (null = use all)
  max_steps: 5000          # Hard cap on training steps (loss converges by ~500)
  fp16: false
  bf16: true               # Use bf16 on Ampere+ / Apple Silicon

lora:
  rank: 32                 # r=32 is a good sweet spot for 500M model
  alpha: 64                # alpha = 2×rank is standard
  dropout: 0.05
  target_modules:          # Target all linear layers in the LM
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

data:
  # Vision data from 02a_prepare_vision_data.py
  train: "../data/vision/smolvlm2_vision_train.jsonl"
  val: "../data/vision/smolvlm2_vision_val.jsonl"
  image_dir: "../data/vision/images"

  # Training mix (roughly equal image + document)
  # Image understanding:    ~50% (VQAv2, TextCaps, paragraph captioning)
  # Document understanding: ~50% (DocVQA, ChartQA, InfoVQA, AI2D)
  datasets:
    image:
      - vqav2               # Visual QA  (~10K samples)
      - textcaps             # OCR-aware captioning (~10K)
      - image_paragraph_captioning  # Long descriptions (~10K)
    document:
      - docvqa               # Document QA — forms, invoices (~10K)
      - chartqa              # Chart understanding (~10K)
      - infovqa              # Infographic QA (~10K)
      - ai2d                 # Diagram understanding (~10K)

mlx:
  # Apple Silicon specific
  # batch_size must be 1 for SmolVLM2 (idefics3) — mlx-vlm's trainer passes
  # attention_mask positionally as cache, and batched image+text processing
  # produces mismatched tensor shapes (logits batch=1 vs targets batch=N).
  batch_size: 1
  lora_layers: 16          # Number of transformer layers to apply LoRA
  # Estimated training time on M1 Pro (16GB):
  #   ~50K examples × 3 epochs → ~6–8 hours
  # Estimated training time on M2 Ultra (192GB):
  #   ~50K examples × 3 epochs → ~1–2 hours

quantization:
  methods:
    - "Q8_0"               # 500M is small — Q8 preserves quality well
    - "Q4_K_M"             # For minimum size (slight quality loss)
  output_dir: "../models/gguf"
  output_name: "SmolVLM2-500M-Video-Instruct-finetuned"
